<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TreeTab</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300;1,6..72,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">

  <!-- ================================================================
       HEADER —— 问候语 + 日期
       ================================================================ -->
  <header>
    <div class="header-left">
      <h1 id="greeting"></h1>
      <div class="date" id="dateDisplay"></div>
    </div>
    <div class="header-right">
      <!-- 深色模式切换按钮 -->
      <button class="theme-toggle" id="themeToggle" title="切换深色/浅色模式">
        <!-- 太阳图标（浅色模式时显示） -->
        <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z" />
        </svg>
        <!-- 月亮图标（深色模式时显示） -->
        <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" style="display:none">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z" />
        </svg>
      </button>
    </div>
  </header>

  <!-- ================================================================
       TAB OUT DUPES BANNER
       ================================================================ -->
  <div class="tab-cleanup-banner" id="tabOutDupeBanner" style="display:none">
    <div class="tab-cleanup-left">
      <div class="tab-cleanup-icon">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 17.25v3.375c0 .621-.504 1.125-1.125 1.125h-9.75a1.125 1.125 0 0 1-1.125-1.125V7.875c0-.621.504-1.125 1.125-1.125H6.75a9.06 9.06 0 0 1 1.5.124m7.5 10.376h3.375c.621 0 1.125-.504 1.125-1.125V11.25c0-4.46-3.243-8.161-7.5-8.876a9.06 9.06 0 0 0-1.5-.124H9.375c-.621 0-1.125.504-1.125 1.125v3.5m7.5 10.375H9.375a1.125 1.125 0 0 1-1.125-1.125v-9.25m12 6.625v-1.875a3.375 3.375 0 0 0-3.375-3.375h-1.5a1.125 1.125 0 0 1-1.125-1.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H9.75" />
        </svg>
      </div>
      <div class="tab-cleanup-text">
        You have <strong id="tabOutDupeCount"></strong> TreeTab tabs open. Keep just this one?
      </div>
    </div>
    <button class="tab-cleanup-btn" data-action="close-tabout-dupes">Close extras</button>
  </div>

  <!-- ================================================================
       SECTION 1: DOMAIN GROUPS —— 按域名分组的标签页（上方）
       ================================================================ -->
  <section class="section" id="domainsSection">
    <div class="section-header">
      <h2 id="domainsTitle">Open tabs</h2>
      <div class="section-line"></div>
      <div class="section-count" id="domainsCount"></div>
    </div>

    <div class="missions" id="domainsMissions"></div>

    <!-- 新建分组区域（放在打开的标签页和标签组之间） -->
    <div class="new-group-dropzone" id="newGroupDropzone">
      <div class="new-group-content">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
        </svg>
        <span>拖拽标签页到这里创建新分组</span>
      </div>
    </div>
  </section>

  <!-- ================================================================
       SECTION 2: TAB GROUPS —— 浏览器标签组（下方）
       ================================================================ -->
  <section class="section" id="groupsSection">
    <div class="section-header">
      <h2>标签组</h2>
      <div class="section-line"></div>
      <div class="section-count" id="groupsCount"></div>
    </div>

    <div class="groups-grid" id="groupsContainer">
      <!-- 动态生成 -->
    </div>
  </section>

  <!-- ================================================================
       FOOTER
       ================================================================ -->
  <footer>
    <div class="footer-stats">
      <div class="stat">
        <div class="stat-num" id="statTabs">—</div>
        <div class="stat-label">Open tabs</div>
        <div class="stat-badge" id="statBadge"></div>
      </div>
    </div>
    <div class="last-refresh">
      <span style="color: var(--muted); font-size: 11px;">
        <a href="https://github.com/userAlex110/TreeTab" target="_top" style="color: var(--muted); text-decoration: underline; text-underline-offset: 2px;">TreeTab</a>
      </span>
    </div>
  </footer>

</div><!-- end .container -->

<!-- ================================================================
     TOAST
     ================================================================ -->
<div class="toast" id="toast">
  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
  </svg>
  <span id="toastText"></span>
</div>

<!-- 主逻辑脚本 -->
<script src="app.js"></script>
</body>
</html>
